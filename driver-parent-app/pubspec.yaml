name: bus_app
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.0.9
  flutter_launcher_icons: ^0.14.1
  iconsax_plus: ^1.0.0
  connectivity_plus: ^6.0.3
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^12.0.0
  http: ^1.2.2
  shared_preferences: ^2.2.3
  image_picker: ^1.1.2
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assests/backgrounds/mobile/mobile_background_login.svg
    - assests/backgrounds/mobile/mobile_background_open.svg
    - assests/backgrounds/mobile/mobile_app_logo.svg
    - assests/backgrounds/mobile/lines.svg
    - assests/backgrounds/mobile/mobile_offline_banner_waves.svg
    - assests/backgrounds/mobile/mobile_background_profile.svg
    - assests/backgrounds/mobile/edit_pen.png
    - assests/backgrounds/mobile/edit_pen_shadow.svg
    - assests/backgrounds/mobile/success_checkmark.png
    - assests/backgrounds/mobile/confused.png
    - assests/backgrounds/mobile/abscence_icon.svg
  fonts:
    - family: Poppins
      fonts:
        - asset: assests/fonts/poppins/Poppins-Thin.ttf
          weight: 100
        - asset: assests/fonts/poppins/Poppins-ThinItalic.ttf
          weight: 100
          style: italic
        - asset: assests/fonts/poppins/Poppins-ExtraLight.ttf
          weight: 200
        - asset: assests/fonts/poppins/Poppins-ExtraLightItalic.ttf
          weight: 200
          style: italic
        - asset: assests/fonts/poppins/Poppins-Light.ttf
          weight: 300
        - asset: assests/fonts/poppins/Poppins-LightItalic.ttf
          weight: 300
          style: italic
        - asset: assests/fonts/poppins/Poppins-Regular.ttf
          weight: 400
        - asset: assests/fonts/poppins/Poppins-Italic.ttf
          weight: 400
          style: italic
        - asset: assests/fonts/poppins/Poppins-Medium.ttf
          weight: 500
        - asset: assests/fonts/poppins/Poppins-MediumItalic.ttf
          weight: 500
          style: italic
        - asset: assests/fonts/poppins/Poppins-SemiBold.ttf
          weight: 600
        - asset: assests/fonts/poppins/Poppins-SemiBoldItalic.ttf
          weight: 600
          style: italic
        - asset: assests/fonts/poppins/Poppins-Bold.ttf
          weight: 700
        - asset: assests/fonts/poppins/Poppins-BoldItalic.ttf
          weight: 700
          style: italic
        - asset: assests/fonts/poppins/Poppins-ExtraBold.ttf
          weight: 800
        - asset: assests/fonts/poppins/Poppins-ExtraBoldItalic.ttf
          weight: 800
          style: italic
        - asset: assests/fonts/poppins/Poppins-Black.ttf
          weight: 900
        - asset: assests/fonts/poppins/Poppins-BlackItalic.ttf
          weight: 900
          style: italic

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  remove_alpha_android: true
  image_path: "assests/backgrounds/mobile/mobile_app_logo.png"
  min_sdk_android: 21