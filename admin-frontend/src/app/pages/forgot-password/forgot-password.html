<div class="forgot-container">
  <!-- Left Panel - Logo Section -->
  <div class="forgot-left">
    <img src="logo.png" alt="XulSafe Logo" class="logo" />
  </div>

  <!-- Right Panel - Form Section -->
  <div class="forgot-right">
    <div class="forgot-form-container">
      <h1>Forgot password</h1>
      <p class="subtitle">To be able to reset your password enter your email address to receive password reset code</p>

      <form class="forgot-form" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <input
            type="email"
            id="email"
            [(ngModel)]="email"
            name="email"
            placeholder="Email address"
            required
          />
        </div>

        <button type="submit" class="btn-send">
          Send code
        </button>
      </form>

      <div class="back-to-login">
        Back to <a routerLink="/login">Sign in</a>
      </div>
    </div>
  </div>
</div>
