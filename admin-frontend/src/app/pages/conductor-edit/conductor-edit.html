<div class="conductor-edit">
  <div class="page-card header-card">
    <h1>Edit driver</h1>
    <a class="back-btn" routerLink="/drivers">Back</a>
  </div>

  <div class="page-card form-card">
    <div class="photo-section">
      <div class="photo-preview" [class.filled]="photoPreview">
        <img *ngIf="photoPreview" [src]="photoPreview" alt="Driver photo preview" />
        <span *ngIf="!photoPreview">Driver photo</span>
      </div>
      <label class="upload-btn">
        Change photo
        <input type="file" accept="image/*" (change)="onPhotoSelected($event)" />
      </label>
    </div>
    <div class="form-grid">
      <label>
        Full name
        <input type="text" [(ngModel)]="fullName" />
      </label>
      <label>
        Gender
        <select [(ngModel)]="gender">
          <option value="">Select gender</option>
          <option *ngFor="let option of genderOptions" [value]="option.value">{{ option.label }}</option>
        </select>
      </label>
      <label>
        Email
        <input type="email" [(ngModel)]="email" />
      </label>
      <label>
        Age
        <input type="number" [(ngModel)]="age" />
      </label>
      <label>
        Status
        <select [(ngModel)]="status">
          <option value="">Select status</option>
          <option *ngFor="let option of statusOptions" [value]="option.value">{{ option.label }}</option>
        </select>
      </label>
      <label>
        Driver ID
        <input type="text" [(ngModel)]="driverId" />
      </label>
      <label>
        Phone
        <input type="text" [(ngModel)]="phone" />
      </label>
      <label>
        Licence number
        <input type="text" [(ngModel)]="licenceNumber" />
      </label>
      <label>
        Licence type
        <input type="text" [(ngModel)]="licenceType" />
      </label>
      <label>
        Licence expiry
        <input type="date" [(ngModel)]="licenceExpiry" />
      </label>
      <label>
        Years of experience
        <input type="text" [(ngModel)]="experience" />
      </label>
      <label>
        Assigned bus
        <input type="text" [(ngModel)]="assignedBus" readonly />
      </label>
      <label>
        Assigned route
        <input type="text" [(ngModel)]="assignedRoute" readonly />
      </label>
    </div>

    <div class="form-actions">
      <button class="btn-ghost" type="button">Cancel</button>
      <button class="btn-primary" type="button" (click)="saveChanges()" [disabled]="isSaving">
        {{ isSaving ? 'Saving...' : 'Save changes' }}
      </button>
    </div>
  </div>
</div>
