server.port=8080
spring.application.name=login-app
server.error.whitelabel.enabled=false

spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=Geoman
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# JWT configuration
app.jwt.secret=dv.K%QYpeA5=5_J_d=3_this_is_a_sufficiently_long_secret_key_for_hmac_sha256
app.jwt.issuer=login-bus-backend
app.jwt.expiry-seconds=86400

# File upload size
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Admin seeder is disabled — use the one-time setup endpoint instead:
# POST /api/v1/admin/setup with { setupKey, email, password, firstName, lastName, phoneNumber }
# Set the ADMIN_SETUP_KEY environment variable before starting the server, then unset it after the admin is created.
admin.seed.enabled=false
admin.setup.key=${ADMIN_SETUP_KEY:}
